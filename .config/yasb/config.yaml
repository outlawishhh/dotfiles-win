# yaml-language-server: $schema=https://raw.githubusercontent.com/amnweb/yasb/main/schema.json
watch_stylesheet: true
watch_config: true
debug: false
update_check: true
komorebi:
  start_command: komorebic start --whkd
  stop_command: komorebic stop --whkd
  reload_command: komorebic stop --whkd && komorebic start --whkd
bars:
  primary-bar:
    enabled: true
    screens: ["primary"]
    class_name: "yasb-bar"
    alignment:
      position: "top"
      center: false
      align: center
    animation:
      enabled: true
      duration: 600
    blur_effect:
      enabled: true
      acrylic: false
      dark_mode: true
      round_corners: false
    window_flags:
      always_on_top: true
      windows_app_bar: true
    dimensions:
      width: "100%"
      height: 34
    widgets:
      left: ["home", "komorebi_workspaces", "systray", "wallpapers"]
      center: ["cava", "media", "cava"]
      right: ["volume", "microphone", "wifi", "clock", "notifications"]

widgets:
  home:
    type: "yasb.home.HomeWidget"
    options:
      label: "<span>\uE70F</span>"
      menu_list:
        - {title: "Windows Settings", uri: "ms-settings:"}
        - {separator: true}
      system_menu: true
      power_menu: true
      blur: false

  komorebi_workspaces:
    type: "komorebi.workspaces.WorkspaceWidget"
    options:
      label_offline: "\u23FC Offline"
      label_workspace_btn: "{index}"
      label_workspace_active_btn: "{index}"
      label_workspace_populated_btn: "{index}"
      label_default_name: "{index}"
      label_zero_index: false
      hide_empty_workspaces: false
      hide_if_offline: true
      animation: true
      enable_scroll_switching: true
      reverse_scroll_direction: false
      toggle_workspace_layer:
        enabled: false
        tiling_label: "Tiling"
        floating_label: "Floating"
      app_icons:
        enabled_populated: true
        enabled_active: true
        size: 17
        max_icons: 0
        hide_label: true
        hide_duplicates: false
        hide_floating: false
      container_padding:
        top: 0
        left: 4
        bottom: 0
        right: 4

  systray:
    type: "yasb.systray.SystrayWidget"
    options:
      class_name: "systray"
      label_collapsed: "\uF067"
      label_expanded: "\uF068"
      label_position: "left"
      icon_size: 17
      pin_click_modifier: "alt"
      show_unpinned: true
      show_unpinned_button: true
      show_battery: false
      show_volume: false
      show_network: false
      tooltip: true

  wallpapers:
    type: "yasb.wallpapers.WallpapersWidget"
    options:
      label: "<span>󰸉</span>"
      tooltip: false
      change_automatically: false
      update_interval: 60
      image_path: "F:\\media\\Wallpapers\\static"
      gallery:
        enabled: true
        blur: false
        image_width: 220
        image_per_page: 6
        gallery_columns: 0
        horizontal_position: "center"
        vertical_position: "center"
        position_offset: 0
        respect_work_area: false
        show_buttons: false
        orientation: "landscape"
        image_spacing: 8
        lazy_load: true
        lazy_load_fadein: 400
        image_corner_radius: 12
      callbacks:
        on_left: "toggle_gallery"
        on_middle: "do_nothing"
        on_right: "change_wallpaper"

  cava:
    type: "yasb.cava.CavaWidget"
    options:
      bar_height: 15
      min_bar_height: 0
      framerate: 60
      gradient: 1
      gradient_color_1: '#333333'
      gradient_color_2: '#999999'
      gradient_color_3: '#ffffff'
      bar_type: "bars"
      bars_number: 8
      bar_spacing: 2
      bar_width: 4
      hide_empty: true
      container_padding:
        top: 0
        left: 8
        bottom: 0
        right: 8

  volume:
    type: "yasb.volume.VolumeWidget"
    options:
      label: "<span>{icon}   </span> {level}"
      label_alt: "<span>{icon}   </span> {level}"
      tooltip: false
      scroll_step: 2
      slider_beep: false
      mute_text: "mute"
      volume_icons:
        - "󰖁"
        - "󰝟"
        - "󰕿"
        - "󰖀"
        - "󰕾"
      audio_menu:
        blur: false
        round_corners: true
        round_corners_type: "normal"
        border_color: "#ffffff"
        alignment: "right"
        direction: "down"
        offset_top: 6
        offset_left: 0
        show_apps: true
        show_app_labels: true
        show_app_icons: true
        show_apps_expanded: false
        app_icons:
          toggle_down: "\uF078"
          toggle_up: "\uF077"
      callbacks:
        on_left: "toggle_volume_menu"
        on_middle: "do_nothing"
        on_right: "toggle_mute"

  microphone:
    type: "yasb.microphone.MicrophoneWidget"
    options:
      label: "<span>{icon}</span>"
      label_alt: "<span>{icon}</span> {level}%"
      icons:
        normal: "󰍬"
        muted: "󰍭"
      callbacks:
        on_left: "toggle_mute"

  wifi:
    type: "yasb.wifi.WifiWidget"
    options:
      label: "<span>{wifi_icon}</span>"
      label_alt: "{wifi_name} {wifi_strength}%"
      update_interval: 5000
      ethernet_label: "<span>{wifi_icon}</span>"
      ethernet_label_alt: "<span>{wifi_icon}</span> {ip_addr}"
      ethernet_icon: "󰈀–"
      get_exact_wifi_strength: false
      hide_if_ethernet: false
      wifi_icons:
        - "󰤯"  # 0% strength
        - "󰤟"  # 1-24% strength
        - "󰤢"  # 25-49% strength
        - "󰤥"  # 50-74% strength
        - "󰤨"  # 75-100% strength
      callbacks:
        on_left: "toggle_menu"
        on_middle: "exec cmd.exe /c start ms-settings:network"
        on_right: "toggle_label"
      menu_config:
        blur: false
        round_corners: true
        round_corners_type: "normal"
        border_color: "#ffffff"
        alignment: "right"
        direction: "down"
        offset_top: 6
        offset_left: 0
        wifi_icons_secured:
          - "󰤬"
          - "󰤡"
          - "󰤤"
          - "󰤪"
        wifi_icons_unsecured:
          - "󱛏"
          - "󱛋"
          - "󱛌"
          - "󱛎"

  clock:
    type: "yasb.clock.ClockWidget"
    options:
      label: "{%A, %d %b %I:%M:%S %p}"
      label_alt: "{%A, %d %b %I:%M:%S %p}"
      timezones: []
      callbacks:
        on_left: "toggle_calendar"

  notifications:
    type: "yasb.notifications.NotificationsWidget"
    options:
      label: "<span>󰂚  </span> {count}"
      label_alt: "{count} notifications"
      hide_empty: false
      tooltip: false
      callbacks:
        on_left: "toggle_notification"
        on_right: "do_nothing"
        on_middle: "toggle_label"

  media:
    type: yasb.media.MediaWidget
    options:
      label: "{title}"
      separator: " - "
      hide_empty: true
      show_thumbnail: false
      controls_only: false
      controls_left: true
      controls_hide: true
      thumbnail_alpha: 50
      thumbnail_padding: 8
      thumbnail_corner_radius: 0
      symmetric_corner_radius: false
      thumbnail_edge_fade: false
      max_field_size:
        label: 30
        label_alt: 30
        truncate_whole_label: false
      icons:
        prev_track: "󰒮"
        next_track: "󰒭"
        play: "󰐊"
        pause: "󰏤"
      callbacks:
        on_left: "toggle_media_menu"
        on_right: "toggle_play_pause"
      media_menu:
        blur: false
        round_corners: true
        round_corners_type: "normal"
        border_color: "#ffffff"
        alignment: "center"
        direction: "down"
        offset_top: 6
        offset_left: 0
        thumbnail_corner_radius: 8
        thumbnail_size: 120
        max_title_size: 60
        max_artist_size: 40
        show_source: false
        show_volume_slider: true
      media_menu_icons:
        prev_track: "󰒮"
        next_track: "󰒭"
        play: "󰐊"
        pause: "󰏤"
        mute: "󰝟"
        unmute: "󱄠"
      scrolling_label:
        enabled: false
        update_interval_ms: 33
        style: "left"
        separator: " | "
        label_padding: 0
        always_scroll: false
        ease_slope: 20
        ease_pos: 0.8
        ease_min: 0.5
      progress_bar:
        enabled: false
        alignment: "bottom"
      container_shadow:
        enabled: false
        color: "black"
        radius: 3
        offset: [1, 1]
      label_shadow:
        enabled: false
        color: "black"
        radius: 3
        offset: [1, 1]
